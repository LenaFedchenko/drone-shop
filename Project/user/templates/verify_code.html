<div class="modal-content">
    <button class="modal-close" type="button">×</button>

    <div class="modal-tabs">
        <button class="modal-tab active" type="button">Підтвердження</button>
    </div>

    <form action="/verify_code" method="post" class="modal-form">
        <label>Введіть код підтвердження</label>

        <div class="verify-inputs">
            <input type="text" name="verify_code1" maxlength="1" inputmode="numeric" autocomplete="one-time-code" autofocus>
            <input type="text" name="verify_code2" maxlength="1" inputmode="numeric">
            <input type="text" name="verify_code3" maxlength="1" inputmode="numeric">
            <input type="text" name="verify_code4" maxlength="1" inputmode="numeric">
            <input type="text" name="verify_code5" maxlength="1" inputmode="numeric">
            <input type="text" name="verify_code6" maxlength="1" inputmode="numeric">
        </div>

        <div class="modal-actions">
            <button type="button" class="cancel-btn modal-cancel">СКАСУВАТИ</button>
            <button type="submit" class="submit-btn">ПІДТВЕРДИТИ</button>
        </div>
    </form>
</div>
